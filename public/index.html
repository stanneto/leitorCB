<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>Leitor Codigo de Barras</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <h1>Leitor de Codigo de Barras</h1>

        <div class="status-panel" aria-live="polite">
          <span class="status-pill" id="status-pill">Aguardando permissao da câmera</span>
          <p class="status-text hidden" id="status-text"></p>
          <div class="diagnostic-panel hidden" id="diagnostic-panel" aria-live="polite">
            <p class="diagnostic-title">Diagnostico do leitor</p>
            <p class="diagnostic-line"><strong>Nome:</strong> <span id="diagnostic-name">-</span></p>
            <p class="diagnostic-line"><strong>Mensagem:</strong> <span id="diagnostic-message">-</span></p>
          </div>
        </div>

        <div class="camera-card">
          <div class="video-stage" id="video-stage">
            <div class="reader-surface">
              <video id="camera-preview" class="camera-preview" muted playsinline></video>
            </div>
            <div class="scan-guide" aria-hidden="true">
              <div class="scan-frame"></div>
              <div class="scan-line"></div>
            </div>
          </div>
        </div>

        <div class="actions actions-scanner">
          <button class="button button-primary" id="start-button" type="button">Iniciar leitura</button>
          <button class="button button-secondary" id="stop-button" type="button" disabled>Parar câmera</button>
          <button class="button button-secondary" id="torch-button" type="button" disabled>Ligar a lanterna</button>
        </div>
      </section>

      <section class="result-dock" aria-live="polite">
        <label class="result-inline-label" for="result-inline-code">Conteúdo lido</label>
        <input
          class="result-inline-input"
          id="result-inline-code"
          type="text"
          value=""
          readonly
        >
      </section>
    </main>

    <div class="result-modal hidden" id="result-modal" role="dialog" aria-modal="true" aria-labelledby="result-title">
      <div class="result-card">
        <p class="result-label">Codigo lido</p>
        <h2 id="result-title">Codigo lido</h2>
        <p class="result-copy">Valor detectado:</p>
        <p class="result-code" id="result-code">-</p>
        <p class="result-copy" id="result-note">
          Leitura concluida com sucesso.
        </p>
        <div class="actions actions-modal">
          <button class="button button-secondary" id="close-button" type="button">Fechar</button>
          <button class="button button-primary" id="retry-button" type="button">Ler novamente</button>
        </div>
      </div>
    </div>

    <script src="/vendor/zxing.min.js"></script>
    <script src="/vendor/zxing-browser.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
